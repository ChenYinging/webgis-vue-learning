<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <style>
    #anhui-map {
      height: 600px;
      width: 1000px;
      margin: 0 auto;
    }

    .info {
      padding: 6px 8px;
      font: 14px/16px Arial, Helvetica, sans-serif;
      background: white;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      border-radius: 5px;
    }

    .info h4 {
      margin: 0 0 5px;
      color: #777;
    }

    .legend {
      line-height: 18px;
      color: #555;
    }

    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div id="anhui-map"></div>

  <script>
    const map = L.map("anhui-map").setView([31.733272524263008, 117.32997259226599], 7);

    const tiles = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
      subdomains: ['1', '2', '3', '4'],
      maxZoom: 19,
      attribution: '&copy; 高德地图'
    }).addTo(map);

    // 转换函数（WGS84 → GCJ02）

    //   const transform = (coords) => {

    //     return coords.map(c => transform(c));
    //   };
    //   return {
    //     ...geoJson,
    //     features: geoJson.features.map(f => ({ ...f, geometry: { ...f.geometry, coordinates: transform(f.geometry.coordinates) } }))
    //   };
    // }

    // L.geoJson(anhuiData, {
    //   style: {
    //     color: '#2E8B57',
    //     weight: 1,
    //     fillColor: '#90EE90',
    //     fillOpacity: 0.4
    //   }
    // }).addTo(map)

    //L.marker([29.393959175749526, 118.19540751630741]).addTo(map).bindPopup("我是黄山最南边")

    // 添加颜色
    function getColor(d) {
      return d > 700 ? '#b71c1c' :
        d > 500 ? '#e53935' :
          d > 300 ? '#fb8c00' :
            d > 150 ? '#ffeb3b' :
              '#81c784';
    }

    function anhuistyle(feature) {
      return {
        fillColor: getColor(feature.properties.density),
        weight: 2,
        opacity: 1,
        color: 'white',
        dashArray: '3', //虚线样式 线长，间隔长
        fillOpacity: 0.7
      };
    }
    //L.geoJson(anhuiData, { style: anhuistyle }).addTo(map);

    // 添加交互
    function highlightFeature(e) {
      const layer = e.target;

      layer.setStyle({
        weight: 3,
        color: '#666',
        dashArray: '',
        fillOpacity: 0.7
      });

      layer.bringToFront();

      info.update(layer.feature.properties);  //鼠标悬停时更新控件
    }

    // 定义鼠标mouseout时发生的事情
    function resetHighlight(e) {
      geojson.resetStyle(e.target)
      info.update();  // 鼠标悬停时更新控件
    }

    // 定义 click 监听缩放状态的变更
    function zoomToFeature(e) {
      map.fitBounds(e.target.getBounds());  // 自动平移 + 缩放
    }

    function onEachFeature(feature, layer) {
      layer.on({
        mouseover: highlightFeature,
        mouseout: resetHighlight,
        click: zoomToFeature
      });
    }

    let geojson;
    geojson = L.geoJson(anhuiData, {
      style: anhuistyle,
      onEachFeature: onEachFeature
    }).addTo(map);

    // 悬停时显示信息
    const info = L.control(); //  创建一个空控件
    info.onAdd = function (map) {
      this._div = L.DomUtil.create('div', 'info'); // 创建一个 div，class="info"
      this.update();  // 初始化内容
      return this._div; // 返回这个 div → 加到地图上
    }

    info.update = function (props) {
      this._div.innerHTML =
        '<h4>人口密度</h4>' +
        (props ? `<b>${props.name}</b><br/>${props.density} 人 / 平方公里` : '请将鼠标悬停在城市上');
    };

    info.addTo(map);

    // 添加图例
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function (map) {
      let div = L.DomUtil.create('div', 'info legend'),
        grades = [0, 150, 300, 500, 700],
        labels = [];

      for (let i = 0; i < grades.length; i++) {
        div.innerHTML += '<i style="background:' + getColor(grades[i] + 1) + '"></i> ' +
          grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
      }

      return div;
    }

    legend.addTo(map);
  </script>
</body>

</html>
