    function getColor(d) {
      return d > 700 ? '#b71c1c' :
        d > 500 ? '#e53935' :
          d > 300 ? '#fb8c00' :
            d > 150 ? '#ffeb3b' :
              '#81c784';

    function anhuistyle(feature) {
      return {
        fillColor: getColor(feature.properties.density),
        weight: 2,
        opacity: 1,
