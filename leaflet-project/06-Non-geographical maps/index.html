<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <link rel="stylesheet" href="../node_modules/leaflet/dist/leaflet.css">
  <script src="../node_modules/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 600px;
      width: 800px;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    const map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -3
    });

    const bounds = [[0, 0], [903, 1440]];
    const image = L.imageOverlay('小羊.jpg', bounds).addTo(map);
    map.fitBounds(bounds);
  </script>
</body>

</html>
